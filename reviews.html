<head>

    <meta name="keywords" content="마포 셔츠룸 후기, 마포셔츠룸 후기, 셔츠룸 리뷰, 마포유흥 후기, 마포룸싸롱 추천, 셔츠룸 실제후기, 셔츠룸 솔직후기, 셔츠룸 이용팁, 셔츠룸 예약후기, 대표실장 추천">

    <meta property="og:description" content="마포 셔츠룸 첫 방문, 친구랑 같이, 혼자 방문까지. 다양한 케이스의 솔직 후기와 대표 실장의 맞춤 코스 추천을 확인하세요.">

    <style>
        :root {
            --bg: #fafaf9;
            --surface: #ffffff;
            --text-primary: #1c1c1c;
            --text-secondary: #6e6e6e;
            --text-tertiary: #9e9e9e;
            --border: #e5e5e2;
            --border-light: #f0f0ec;
            --accent: #1c1c1c;
            --accent-hover: #3a3a3a;
            --success: #2d5a27;
            --tag-bg: #f3f4f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --max-width: 860px;
            --nav-height: 64px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.7;
            font-weight: 400;
            font-size: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Skip Navigation */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 16px;
            background: var(--accent);
            color: #fff;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            z-index: 1000;
            font-weight: 500;
            text-decoration: none;
            transition: top 0.2s ease;
        }

        .skip-link:focus {
            top: 16px;
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        /* HEADER & NAV */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250,250,249,0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            height: var(--nav-height);
        }

        .nav-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo span {
            font-weight: 400;
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: -0.01em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 450;
            letter-spacing: -0.01em;
            transition: color 0.18s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent);
            transition: width 0.2s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .tel-link {
            background: var(--accent);
            color: #fff !important;
            padding: 8px 18px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: -0.01em;
            transition: background 0.2s ease, transform 0.15s ease;
            white-space: nowrap;
        }

        .tel-link:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .tel-link::after {
            display: none;
        }

        /* Hamburger Menu */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px 4px;
            z-index: 101;
        }

        .hamburger-menu span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.25s ease;
            transform-origin: center;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background: var(--surface);
                flex-direction: column;
                gap: 0;
                padding: 16px 0;
                border-bottom: 1px solid var(--border);
                box-shadow: var(--shadow-md);
                transform: translateY(-110%);
                opacity: 0;
                transition: transform 0.3s ease, opacity 0.25s ease;
                z-index: 99;
            }

            .nav-present .nav-links {
                transform: translateY(0);
                opacity: 1;
            }

            .nav-links a {
                display: block;
                padding: 14px 32px;
                font-size: 1rem;
                border-bottom: 1px solid var(--border-light);
            }

            .nav-links a:last-child {
                border-bottom: none;
            }

            .tel-link {
                margin: 8px 24px;
                text-align: center;
                display: block;
                border-radius: var(--radius-sm);
                padding: 14px;
            }

            .hamburger-menu {
                display: flex;
            }

            .hamburger-menu.active span:nth-child(1) {
                transform: translateY(7px) rotate(45deg);
            }

            .hamburger-menu.active span:nth-child(2) {
                opacity: 0;
            }

            .hamburger-menu.active span:nth-child(3) {
                transform: translateY(-7px) rotate(-45deg);
            }

            .container {
                padding: 0 16px;
            }
        }

        /* PAGE CONTENT STYLES */
        .page-section {
            padding: 48px 0;
        }

        .section-header {
            margin-bottom: 36px;
            text-align: left;
        }

        .section-label {
            display: inline-block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .section-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: -0.01em;
            max-width: 560px;
        }

        /* Review Card Styles */
        .review-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .review-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 28px 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.25s ease, border-color 0.25s ease;
            position: relative;
        }

        .review-card:hover {
            box-shadow: var(--shadow-md);
            border-color: #d5d5cf;
        }

        .review-card__header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
        }

        .review-card__avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--tag-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .review-card__meta {
            flex: 1;
        }

        .review-card__name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .review-card__info {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: 2px;
            letter-spacing: -0.01em;
        }

        .review-card__rating {
            display: flex;
            gap: 3px;
            margin-top: 4px;
        }

        .review-card__rating span {
            color: #f5a623;
            font-size: 0.85rem;
        }

        .review-card__body {
            font-size: 0.95rem;
            line-height: 1.75;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
        }

        .review-card__body strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .review-card__tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }

        .review-tag {
            background: var(--tag-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
        }

        .review-tag--highlight {
            background: #e8ede6;
            color: var(--success);
            font-weight: 600;
        }

        /* Trust Signal Banner */
        .trust-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            margin: 40px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 32px;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
        }

        .trust-banner__item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .trust-banner__icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--tag-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        /* CTA Section */
        .cta-card {
            background: var(--accent);
            color: #fff;
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            text-align: center;
            margin-top: 40px;
        }

        .cta-card__title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .cta-card__desc {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-bottom: 24px;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .cta-button {
            display: inline-block;
            background: #fff;
            color: var(--accent);
            padding: 14px 36px;
            border-radius: 28px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            letter-spacing: -0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .
</body>
</html>
